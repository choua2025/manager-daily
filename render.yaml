services:
  - type: web
    name: life-manager-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run migrate:deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: life-manager-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 10
      - key: CORS_ORIGIN
        value: https://your-frontend.onrender.com
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: life-manager-db
    plan: free
    databaseName: life_manager_db
    user: life_manager_user
